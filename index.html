<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spider Clock</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CLOCK */
.clock {
    position: relative;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    box-shadow: 0 0 40px orange;
}

/* HANDS */
.hand {
    position: absolute;
    bottom: 50%;
    left: 50%;
    transform-origin: bottom;
    transform: translateX(-50%);
    background: orange;
}

.hour { height: 90px; width: 5px; }
.minute { height: 130px; width: 3px; }
.second { height: 150px; width: 2px; background: red; }

/* SPIDER */
.spider {
    position: absolute;
    width: 30px;
    height: 30px;
    background: orange;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* LEGS */
.leg {
    position: absolute;
    width: 80px;
    height: 2px;
    background: orange;
    top: 50%;
    left: 50%;
    transform-origin: left;
    animation: move 2s infinite ease-in-out;
}

/* DIFFERENT ANGLES */
.leg:nth-child(1) { transform: rotate(0deg); animation-delay: 0s; }
.leg:nth-child(2) { transform: rotate(45deg); animation-delay: 0.2s; }
.leg:nth-child(3) { transform: rotate(90deg); animation-delay: 0.4s; }
.leg:nth-child(4) { transform: rotate(135deg); animation-delay: 0.6s; }
.leg:nth-child(5) { transform: rotate(180deg); animation-delay: 0.8s; }
.leg:nth-child(6) { transform: rotate(225deg); animation-delay: 1s; }
.leg:nth-child(7) { transform: rotate(270deg); animation-delay: 1.2s; }
.leg:nth-child(8) { transform: rotate(315deg); animation-delay: 1.4s; }

/* ANIMATION */
@keyframes move {
    0% { transform: scaleX(1) rotate(var(--r)); }
    50% { transform: scaleX(1.2) rotate(var(--r)); }
    100% { transform: scaleX(1) rotate(var(--r)); }
}
</style>
</head>

<body>

<div class="clock" id="clock"></div>

<script>
const clock = document.getElementById("clock");

/* HANDS */
function createHand(cls) {
    const h = document.createElement("div");
    h.className = "hand " + cls;
    clock.appendChild(h);
    return h;
}

const hour = createHand("hour");
const minute = createHand("minute");
const second = createHand("second");

/* SPIDER */
const spider = document.createElement("div");
spider.className = "spider";
clock.appendChild(spider);

/* LEGS */
for (let i = 0; i < 8; i++) {
    const leg = document.createElement("div");
    leg.className = "leg";
    spider.appendChild(leg);
}

/* CLOCK */
function updateClock() {
    const now = new Date();

    const s = now.getSeconds();
    const m = now.getMinutes();
    const h = now.getHours();

    second.style.transform = `translateX(-50%) rotate(${s*6}deg)`;
    minute.style.transform = `translateX(-50%) rotate(${m*6}deg)`;
    hour.style.transform = `translateX(-50%) rotate(${h*30}deg)`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
